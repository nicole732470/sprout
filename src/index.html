<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="widget" id="widget">
    <header class="header drag-region">
      <span class="brand">🌱 Sprout</span>
      <button class="icon-btn no-drag" id="btn-sync" title="同步 GitHub">↑</button>
    </header>

    <main class="main no-drag">
      <div class="garden">
        <!-- Connect plant -->
        <button class="pot" id="btn-connect" aria-label="记录 Connect">
          <svg class="plant-svg" viewBox="0 0 64 80" id="plant-connect">
            <ellipse class="pot-body" cx="32" cy="72" rx="22" ry="7" />
            <path class="pot-rim" d="M12 58 L52 58 L48 68 L16 68 Z" />
            <rect class="soil" x="16" y="54" width="32" height="6" rx="2" />
            <g class="growth" data-plant="connect">
              <circle class="seed" cx="32" cy="52" r="3" />
              <path class="sprout stem" d="M32 52 Q32 44 32 36" />
              <ellipse class="leaf l1" cx="26" cy="40" rx="7" ry="4" transform="rotate(-30 26 40)" />
              <ellipse class="leaf l2" cx="38" cy="36" rx="7" ry="4" transform="rotate(25 38 36)" />
              <ellipse class="leaf l3" cx="24" cy="30" rx="6" ry="3.5" transform="rotate(-40 24 30)" />
              <ellipse class="leaf l4" cx="40" cy="28" rx="6" ry="3.5" transform="rotate(35 40 28)" />
              <circle class="bud" cx="32" cy="22" r="5" />
              <g class="bloom">
                <circle cx="32" cy="18" r="4" fill="#c4a8e8" />
                <circle cx="27" cy="20" r="3.5" fill="#d4b8f0" />
                <circle cx="37" cy="20" r="3.5" fill="#d4b8f0" />
                <circle cx="29" cy="15" r="3.5" fill="#b898dc" />
                <circle cx="35" cy="15" r="3.5" fill="#b898dc" />
                <circle cx="32" cy="18" r="2" fill="#f0d878" />
              </g>
            </g>
          </svg>
          <span class="pot-label">Connect</span>
          <span class="pot-count" id="count-connect">0</span>
        </button>

        <!-- Apply plant -->
        <button class="pot" id="btn-apply" aria-label="记录投递">
          <svg class="plant-svg" viewBox="0 0 64 80" id="plant-apply">
            <ellipse class="pot-body" cx="32" cy="72" rx="22" ry="7" />
            <path class="pot-rim" d="M12 58 L52 58 L48 68 L16 68 Z" />
            <rect class="soil" x="16" y="54" width="32" height="6" rx="2" />
            <g class="growth" data-plant="apply">
              <circle class="seed" cx="32" cy="52" r="3" />
              <path class="sprout stem" d="M32 52 Q31 42 32 34" />
              <ellipse class="leaf l1" cx="26" cy="42" rx="7" ry="4" transform="rotate(-28 26 42)" />
              <ellipse class="leaf l2" cx="38" cy="38" rx="7" ry="4" transform="rotate(22 38 38)" />
              <ellipse class="leaf l3" cx="25" cy="32" rx="6" ry="3.5" transform="rotate(-38 25 32)" />
              <ellipse class="leaf l4" cx="39" cy="28" rx="6" ry="3.5" transform="rotate(32 39 28)" />
              <circle class="bud" cx="32" cy="20" r="5" />
              <g class="bloom">
                <circle cx="32" cy="16" r="5" fill="#f5c842" />
                <ellipse cx="32" cy="16" rx="9" ry="9" fill="none" stroke="#f5c842" stroke-width="2.5"
                         stroke-dasharray="3 4" transform="rotate(0 32 16)" />
                <ellipse cx="32" cy="16" rx="9" ry="9" fill="none" stroke="#f5a623" stroke-width="2"
                         stroke-dasharray="3 4" transform="rotate(22 32 16)" />
                <circle cx="32" cy="16" r="3" fill="#e88c20" />
              </g>
            </g>
          </svg>
          <span class="pot-label">投递</span>
          <span class="pot-count" id="count-apply">0</span>
        </button>
      </div>

      <div class="coach" id="coach">
        <p class="coach-main" id="coach-main">点花盆记录，植物会慢慢长大</p>
        <p class="coach-sub" id="coach-sub"></p>
      </div>
    </main>

    <footer class="footer no-drag">
      <button class="foot-btn" id="btn-undo-connect" title="撤销 Connect">↩</button>
      <span class="goals" id="goals-line">100/周 · 50/日</span>
      <button class="foot-btn" id="btn-undo-apply" title="撤销投递">↩</button>
    </footer>

    <div class="toast" id="toast"></div>
  </div>

  <script src="coach.js"></script>
  <script src="app.js"></script>
</body>
</html>
